name: CI

# Quality gate only — deployment is handled by Vercel's GitHub integration.
# This never deploys; it just runs tests + build so broken code can't merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
